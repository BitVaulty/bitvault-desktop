name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config \
            libxcb1-dev \
            libxkbcommon-dev
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            bitvault-app/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('bitvault-app/Cargo.lock') }}
      
      - name: Build
        working-directory: bitvault-app
        run: cargo build --release
      
      - name: Run tests
        working-directory: bitvault-app
        run: cargo test --release
      
      - name: Package release
        shell: bash
        working-directory: bitvault-app
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if [ "${{ runner.os }}" == "Linux" ]; then
            tar czf ../../bitvault-desktop-${VERSION}-linux-x86_64.tar.gz target/release/bitvault-app
          elif [ "${{ runner.os }}" == "macOS" ]; then
            tar czf ../../bitvault-desktop-${VERSION}-macos.tar.gz target/release/bitvault-app
          elif [ "${{ runner.os }}" == "Windows" ]; then
            powershell Compress-Archive -Path target/release/bitvault-app.exe -DestinationPath ../../bitvault-desktop-${VERSION}-windows-x86_64.zip
          fi
      
      - name: Generate checksum
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Linux" ] || [ "${{ runner.os }}" == "macOS" ]; then
            sha256sum bitvault-desktop-* > checksums.txt
          else
            powershell Get-FileHash -Algorithm SHA256 bitvault-desktop-* | Format-Table -AutoSize > checksums.txt
          fi
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            bitvault-desktop-*
            checksums.txt
  
  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
