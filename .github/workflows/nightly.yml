name: Nightly Build

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC daily
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config \
            libxcb1-dev \
            libxkbcommon-dev
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-nightly-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-nightly-
      
      - name: Build
        working-directory: bitvault-app
        run: cargo build --release
      
      - name: Package binary
        shell: bash
        working-directory: bitvault-app
        run: |
          # Platform-specific packaging
          if [ "${{ runner.os }}" == "Linux" ]; then
            tar czf ../../bitvault-desktop-nightly-linux-x86_64-$(date +%Y-%m-%d).tar.gz target/release/bitvault-app
          elif [ "${{ runner.os }}" == "macOS" ]; then
            tar czf ../../bitvault-desktop-nightly-macos-$(date +%Y-%m-%d).tar.gz target/release/bitvault-app
          elif [ "${{ runner.os }}" == "Windows" ]; then
            powershell Compress-Archive -Path target/release/bitvault-app.exe -DestinationPath ../../bitvault-desktop-nightly-windows-x86_64-$(date +%Y-%m-%d).zip
          fi
      
      - name: Generate checksum
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Linux" ] || [ "${{ runner.os }}" == "macOS" ]; then
            sha256sum bitvault-desktop-nightly-* > checksums.txt
          else
            powershell Get-FileHash -Algorithm SHA256 bitvault-desktop-nightly-* | Format-Table -AutoSize > checksums.txt
          fi
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.os }}-${{ github.run_number }}
          path: |
            bitvault-desktop-nightly-*
            checksums.txt
          retention-days: 90
